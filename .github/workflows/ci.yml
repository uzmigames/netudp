name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            cmake_args: ""
          - os: ubuntu-latest
            compiler: gcc
            cmake_args: "-DCMAKE_C_COMPILER=gcc-12 -DCMAKE_CXX_COMPILER=g++-12"
          - os: macos-latest
            compiler: clang
            cmake_args: ""

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.compiler }})

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNETUDP_BUILD_TESTS=ON ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
